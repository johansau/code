<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué tipo de jugador de Free Fire eres?</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 800px;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(255, 75, 43, 0.2);
            border: 1px solid #ff4b2b;
        }

        h1 {
            color: #ff8c00;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        }

        p {
            font-size: 1.2rem;
            color: #cccccc;
            line-height: 1.6;
        }

        .btn-empezar {
            background: linear-gradient(45deg, #ff4b2b, #ff8c00);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-empezar:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¿Qué tipo de jugador de Free Fire eres?</h1>
        <p>¿Eres un Rushero sin miedo al éxito, un Campero estratega que asegura sus puntos, o el Soporte que siempre salva al clan? ¡Descúbrelo en este test!</p>
        
        <button class="btn-empezar">Iniciar Test</button>
    </div>

</body>
</html>
